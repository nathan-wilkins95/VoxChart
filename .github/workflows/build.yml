name: VoxChart CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install faster-whisper customtkinter sounddevice soundfile numpy packaging pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
